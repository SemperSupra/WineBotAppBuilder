name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'BACKLOG.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/approved-actors.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'BACKLOG.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/approved-actors.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run containerized lint
        run: |
          export WBAB_ALLOW_LOCAL_BUILD=0
          chmod +x scripts/lint.sh scripts/lint-container.sh
          ./scripts/lint.sh

  shell-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run shell unit tests (mocked)
        run: |
          chmod +x tests/shell/run.sh
          ./tests/shell/run.sh

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run contract tests
        run: |
          chmod +x tests/contract/run.sh
          ./tests/contract/run.sh

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run policy tests
        run: |
          chmod +x tests/policy/run.sh
          ./tests/policy/run.sh

  python-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Cache pip packages
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install coverage hypothesis
      - name: Run Python unit tests with coverage
        run: |
          python3 -m coverage run --source=core -m unittest discover -s tests/unit -p "*.py"
          python3 -m coverage run --append --source=core tests/test_wbabd_concurrency.py
      - name: Report coverage
        run: |
          python3 -m coverage report -m
          python3 -m coverage html -d coverage_html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          if-no-files-found: warn

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run mocked e2e smoke pipeline
        run: |
          chmod +x tests/e2e/run.sh
          ./tests/e2e/run.sh
